<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気分で音楽選択</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background: #e5e7eb; /* うっすらグレー */
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
}

/* 背景画像 */
#bg-image {
  opacity: 0.75;
  filter: blur(1px);
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-size: cover;
  background-position: center;

  z-index: -1;
  transition: 0.5s;
}

.container {
  background: rgba(200, 200, 200, 0.3);
  width: 65%;
  margin: 10px auto;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
  min-height: 85vh;
  position: relative;
}

h1 {
  text-align: left;
}

/* 気分ボタン */
.moods button {
  margin: 8px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;

  opacity: 0.8; /* ← 半透明 */
  transition: 0.2s;
}

.moods button {
  transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
}

.moods button:hover {
  transform: translateY(-2px);
  opacity: 1;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* 色 */
.happy { background: rgba(251, 207, 232, 0.8); }
.relax { background: rgba(187, 247, 208, 0.8); }
.tired { background: rgba(191, 219, 254, 0.8); }
.sad   { background: rgba(203, 213, 245, 0.8); }
.angry { background: rgba(254, 202, 202, 0.8); }

/* 選択中 */
.selected {
  filter: brightness(1.05);
  outline: none;
  transform: scale(1.08); /* ← 少し大きく */
  opacity: 1;

  box-shadow: 
    0 0 0 3px rgba(255,255,255,0.6);
    0 6px 15px rgba(0,0,0,0.2);
  }

/* 押した感 */
.moods button:active {
  transform: scale(0.95);
}

/* 詳細 */
.details {
  display: none;
  margin-top: 15px;
  position: absolute;
  left: 60px;
  top: 160px;
}

.detail-box button {
  display: block;
  margin: 8px 0;
  width: 220px;
}

.detail-box {
  display: none;
  margin-top: 20px;
}

.detail-box button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 220px;
  border-radius: 15px;
  border: none;
  cursor: pointer;

  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(8px);
}

/* カード */
.card {
  background: rgba(255, 255, 255, 0.25);

  width: 220px;
  height: 360px;

  padding: 14px;
  border-radius: 24px;

  backdrop-filter: blur(14px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);

  position: relative;
  top: -35px;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.5s forwards;
}

.card img {
  width: 88%;
  aspect-ratio: 1 / 1;

  object-fit: cover;

  border-radius: 10px;

  display: block;
  margin: 0 auto;
}

/* コントロール全体 */
.music-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  margin-top: 12px;
}

/* メイン再生 */
.play {
  background: transparent;
  border: none;
  color: black;
  font-size: 26px;
  cursor: pointer;
  transition: 0.2s;
  padding: 0;
  line-height: 1;
}

.play:hover {
  transform: none;
}

/* 小さいボタン */
.sub-btn {
  background: transparent;
  border: none;
  color: black;
  font-size: 22px;
  cursor: pointer;
  opacity: 0.7;
  line-height: 1;
}

.sub-btn:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* シークバー横 */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;

  margin-top: 12px;
}

/* 時間 */
.time {
  font-size: 12px;
  opacity: 0.7;
}

/* バー */
.progress {
  flex: 1;
  height: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 999px;
  overflow: hidden;
}

/* 再生済み */
.progress-bar {
  width: 35%;
  height: 100%;
  background: black;
  border-radius: 999px;
}

/* アニメ */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 結果 */
#result {
  position: absolute;
  top: 220px;
  right: 150px;
}

@media (max-width: 768px) {

body {
  margin: 0;
  overflow-x: hidden;
}

/* コンテナ */
.container {
  width: 92%;
  min-height: 100vh;

  padding: 20px;

  border-radius: 0;

  box-sizing: border-box;
}

/* タイトル */
h1 {
  font-size: 24px;
}

/* 気分ボタン */
.moods {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.moods button {
  font-size: 13px;
  padding: 10px 16px;
}

/* 詳細 */
.details {
  position: static !important;
  width: 100%;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.detail-box {
  display: none;
  width: 100%;
  flex-direction: column;
  align-items: center;
}

.detail-box button {
  width: 68%;
  max-width: 200px;
  margin: 10px 0;
}

/* 結果エリア */
#result {
  position: static;

  margin-top: 30px;

  display: flex;
  justify-content: center;
}

/* カード */
.card {
  width: 220px;
  height: 360px;

  top: 0;
}

/* ジャケット */
.card img {
  width: 88%;
}

/* 再生ボタン */
.play {
  font-size: 26px;
}

/* サブボタン */
.sub-btn {
  font-size: 22px;
}

/* 戻るボタン */
#backBtn {
  margin-bottom: 16px;
}

.spotify-login {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;

  padding: 8px 14px;

  border: none;
  border-radius: 999px;

  cursor: pointer;
}

}

</style>
</head>

<body>

  <button id="spotify-login" class="spotify-login">
  Spotifyログイン
  </button>

<!-- 背景画像レイヤー -->
<div id="bg-image"></div>

<div class="container">
  <h1>気分選択</h1>

  <button id="backBtn" onclick="goBack()" style="display:none;">← 戻る</button>

  <!-- 1段階目 -->
  <div class="moods">
    <button class="happy" onclick="showDetail(event, 'happy')">楽しい</button>
    <button class="relax" onclick="showDetail(event, 'relax')">リラックス</button>
    <button class="tired" onclick="showDetail(event, 'tired')">疲れた</button>
    <button class="sad" onclick="showDetail(event, 'sad')">しんみり</button>
    <button class="angry" onclick="showDetail(event, 'angry')">イライラ</button>
  </div>

  <!-- 2段階目 -->
  <div class="details">

    <div id="happy" class="detail-box">
      <button onclick="showResult('テンション上げる曲')">テンション上げる</button>
      <button onclick="showResult('ノリたい曲')">ノリたい</button>
      <button onclick="showResult('明るい気分の曲')">明るい気分</button>
    </div>

    <div id="relax" class="detail-box">
      <button onclick="showResult('チル系')">チル</button>
      <button onclick="showResult('まったり系')">まったり</button>
      <button onclick="showResult('夜に聴きたい曲')">夜に聴きたい</button>
    </div>

    <div id="tired" class="detail-box">
      <button onclick="showResult('眠りたい音楽')">眠りたい</button>
      <button onclick="showResult('落ち着く音楽')">落ち着きたい</button>
      <button onclick="showResult('静かな音楽')">静かに過ごす</button>
    </div>

    <div id="sad" class="detail-box">
      <button onclick="showResult('切ない曲')">切ない</button>
      <button onclick="showResult('雨の日の曲')">雨の日</button>
      <button onclick="showResult('ピアノ系')">ピアノ系</button>
    </div>

    <div id="angry" class="detail-box">
      <button onclick="showResult('発散できる曲')">発散したい</button>
      <button onclick="showResult('激しめ')">激しめ</button>
      <button onclick="showResult('落ち着く曲')">落ち着きたい</button>
    </div>

  </div>

  <div id="result"></div>
</div>

<!-- JS読み込み（これ重要） -->
<script src="script.js"></script>
</body>
</html>
