<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気分で音楽選択</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background: #e5e7eb; /* うっすらグレー */
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
}

/* 背景画像 */
#bg-image {
  opacity: 0.75;
  filter: blur(1px);
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-size: cover;
  background-position: center;

  z-index: -1;
  transition: 0.5s;
}

.container {
  background: rgba(200, 200, 200, 0.3); /* ← 薄くする */
  width: 65%; /* ← 少し小さく */
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px); /* ← ガラスっぽく（超おすすめ） */
}
h1 {
  text-align: left;
}

/* 気分ボタン */
.moods button {
  margin: 8px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;

  opacity: 0.8; /* ← 半透明 */
  transition: 0.2s;
}

.moods button {
  transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
}

.moods button:hover {
  transform: translateY(-2px);
  opacity: 1;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* 色 */
.happy { background: rgba(251, 207, 232, 0.8); }
.relax { background: rgba(187, 247, 208, 0.8); }
.tired { background: rgba(191, 219, 254, 0.8); }
.sad   { background: rgba(203, 213, 245, 0.8); }
.angry { background: rgba(254, 202, 202, 0.8); }

/* 選択中 */
.selected {
  filter: brightness(1.05);
  outline: none;
  transform: scale(1.08); /* ← 少し大きく */
  opacity: 1;

  box-shadow: 
    0 0 0 3px rgba(255,255,255,0.6);
    0 6px 15px rgba(0,0,0,0.2);
}

/* 押した感 */
.moods button:active {
  transform: scale(0.95);
}

/* 詳細 */
.details {
  display: none;
  margin-top: 30px;
}

.detail-box {
  display: none;
  margin-top: 20px;
}

.detail-box button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

/* カード */
.card {
  background: white;
  width: 200px;
  padding: 15px;
  border-radius: 15px;
  margin: 20px auto;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);

  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.5s forwards;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* 再生ボタン */
.play {
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.play::before {
  content: "";
  position: absolute;
  left: 17px;
  top: 12px;
  border-left: 12px solid white;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
}

.play:hover {
  transform: scale(1.1);
}

/* アニメ */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 結果 */
#result {
  margin-top: 30px;
}

@media (max-width: 768px) {

  .container {
    width: 92%;
    margin: 10px auto;
    padding: 20px 15px;
    border-radius: 25px;
  }

  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .moods {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .moods button {
    width: 110px;
    font-size: 13px;
    padding: 10px;
  }

  .detail-box button {
    width: 90%;
    font-size: 14px;
  }

  .card {
    width: 88%;
    padding: 18px;
    margin-top: 25px;
    border-radius: 22px;
  }

  .card img {
    width: 100%;
    border-radius: 15px;
  }

  .play {
    width: 52px;
    height: 52px;
    margin-top: 15px;
  }

  #result {
    display: flex;
    justify-content: center;
  }

  #backBtn {
    border: none;
    background: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 15px;
    cursor: pointer;
    margin-bottom: 15px;
  }
}


</style>
</head>

<body>

<!-- 背景画像レイヤー -->
<div id="bg-image"></div>

<div class="container">
  <h1>気分選択</h1>

  <button id="backBtn" onclick="goBack()" style="display:none;">← 戻る</button>

  <!-- 1段階目 -->
  <div class="moods">
    <button class="happy" onclick="showDetail(event, 'happy')">楽しい</button>
    <button class="relax" onclick="showDetail(event, 'relax')">リラックス</button>
    <button class="tired" onclick="showDetail(event, 'tired')">疲れた</button>
    <button class="sad" onclick="showDetail(event, 'sad')">しんみり</button>
    <button class="angry" onclick="showDetail(event, 'angry')">イライラ</button>
  </div>

  <!-- 2段階目 -->
  <div class="details">

    <div id="happy" class="detail-box">
      <button onclick="showResult('テンション上げる曲')">テンション上げる</button>
      <button onclick="showResult('ノリたい曲')">ノリたい</button>
      <button onclick="showResult('明るい気分の曲')">明るい気分</button>
    </div>

    <div id="relax" class="detail-box">
      <button onclick="showResult('チル系')">チル</button>
      <button onclick="showResult('まったり系')">まったり</button>
      <button onclick="showResult('夜に聴きたい曲')">夜に聴きたい</button>
    </div>

    <div id="tired" class="detail-box">
      <button onclick="showResult('眠りたい音楽')">眠りたい</button>
      <button onclick="showResult('落ち着く音楽')">落ち着きたい</button>
      <button onclick="showResult('静かな音楽')">静かに過ごす</button>
    </div>

    <div id="sad" class="detail-box">
      <button onclick="showResult('切ない曲')">切ない</button>
      <button onclick="showResult('雨の日の曲')">雨の日</button>
      <button onclick="showResult('ピアノ系')">ピアノ系</button>
    </div>

    <div id="angry" class="detail-box">
      <button onclick="showResult('発散できる曲')">発散したい</button>
      <button onclick="showResult('激しめ')">激しめ</button>
      <button onclick="showResult('落ち着く曲')">落ち着きたい</button>
    </div>

  </div>

  <div id="result"></div>
</div>

<!-- JS読み込み（これ重要） -->
<script src="script.js"></script>

</body>
</html>
